          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ── Adaptive demo ────────────────────────────────────────────
  /demo/levels:
    get:
      operationId: getDemoLevels
      tags: [demo]
      summary: List available reading levels
      responses:
        "200":
          description: Levels
          content:
