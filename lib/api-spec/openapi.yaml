  /compass/meetings/{id}/process-notes:
    post:
      operationId: processMeetingNotes
      tags: [agenda]
      summary: Extract the three live-capture streams from a meeting's notes and propose the next agenda
      description: >-
        Extracts decisions, action items, and open questions from the meeting's
        notes (built-in AI when configured, deterministic rules otherwise). New
        entries are added idempotently: anything matching an existing project
        entry by normalized text is skipped, so re-running does not duplicate.
        Also builds the proposed agenda for the next meeting from its standing
        template plus everything carried forward (open action items, open
        questions, and unmet exit criteria from this meeting).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessNotesInput"
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessNotesResult"

  /compass/meetings/{id}/agenda-checklist:
    patch:
      operationId: setAgendaChecklist
      tags: [agenda]
      summary: Check off a proposed-agenda item or one of its prompts
      description: >-
        Toggles the completion state of a single proposed-agenda item, or a
        single prompt within an item, on the meeting's stored agenda. The update
        is applied with a row lock so concurrent toggles never lose each other.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgendaChecklistToggle"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
