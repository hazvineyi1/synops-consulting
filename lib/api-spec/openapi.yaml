openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UVA Production Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: projects
    description: Project pipeline management
  - name: courses
    description: Course and module structure
  - name: objectives
    description: Objectives cascade
  - name: assessments
    description: Assessments and activities
  - name: ledger
    description: Evidence Ledger
  - name: qa
    description: QA and accessibility
  - name: standards
    description: Standards frameworks and accreditation crosswalk
  - name: dashboard
    description: Dashboard summaries
  - name: recordings
    description: Project meeting recordings (uploads and external links)
  - name: time-tracking
    description: Per-project billing time entries (hours and minutes only)
  - name: agenda
    description: Per-project meeting agenda, notes, action items, and derived progress
  - name: storage
    description: Object storage upload and serving
  - name: roster
    description: Class roster membership
  - name: billing
    description: Subscription plans, checkout, and billing portal

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ───────────────────────────────────────────────
  /compass/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /compass/dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityFeedItem"

  # ── Clients ──────────────────────────────────────────────────
  /compass/clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /compass/clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  # ── Projects ─────────────────────────────────────────────────
  /compass/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /compass/projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /compass/projects/{id}/advance-stage:
    post:
      operationId: advanceProjectStage
      tags: [projects]
      summary: Advance the project to the next pipeline stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageAdvanceInput"
      responses:
        "200":
          description: Stage advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Gate requirements not met

  /compass/projects/{id}/gate-status:
    get:
      operationId: getProjectGateStatus
      tags: [projects]
      summary: Get gate requirements and status for the current stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateStatus"

  # ── Courses ───────────────────────────────────────────────────
  /compass/projects/{projectId}/courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /compass/courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  # ── Modules ───────────────────────────────────────────────────
  /compass/courses/{courseId}/modules:
    get:
      operationId: listModules
      tags: [courses]
      summary: List modules for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"
    post:
      operationId: createModule
      tags: [courses]
      summary: Create a module for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"

  /compass/modules/{id}:
    patch:
      operationId: updateModule
      tags: [courses]
      summary: Update a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
    delete:
      operationId: deleteModule
      tags: [courses]
      summary: Delete a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Objectives Cascade ────────────────────────────────────────
  /compass/projects/{projectId}/objectives:
    get:
      operationId: listObjectives
      tags: [objectives]
      summary: List objectives for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Objectives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Objective"
    post:
      operationId: createObjective
      tags: [objectives]
      summary: Create an objective
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectiveInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Objective"

  /compass/objectives/{id}:
    patch:
      operationId: updateObjective
      tags: [objectives]
      summary: Update an objective
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectiveUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Objective"
    delete:
      operationId: deleteObjective
      tags: [objectives]
      summary: Delete an objective
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Assessments ───────────────────────────────────────────────
  /compass/courses/{courseId}/assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List assessments for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Create an assessment
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"

  /compass/assessments/{id}:
    patch:
      operationId: updateAssessment
      tags: [assessments]
      summary: Update an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
    delete:
      operationId: deleteAssessment
      tags: [assessments]
      summary: Delete an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Activities ────────────────────────────────────────────────
  /compass/courses/{courseId}/activities:
    get:
      operationId: listActivities
      tags: [assessments]
      summary: List activities for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [assessments]
      summary: Create an activity
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /compass/activities/{id}:
    patch:
      operationId: updateActivity
      tags: [assessments]
      summary: Update an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [assessments]
      summary: Delete an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Evidence Ledger ───────────────────────────────────────────
  /compass/projects/{projectId}/ledger:
    get:
      operationId: listLedgerEntries
      tags: [ledger]
      summary: List evidence ledger entries for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"
    post:
      operationId: createLedgerEntry
      tags: [ledger]
      summary: Create an evidence ledger entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LedgerEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  /compass/projects/{projectId}/ledger/report:
    get:
      operationId: getLedgerReport
      tags: [ledger]
      summary: Generate proof artifacts from the evidence ledger
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerReport"

  # ── QA & Accessibility ────────────────────────────────────────
  /compass/projects/{projectId}/qa:
    get:
      operationId: listQAChecks
      tags: [qa]
      summary: List QA checks for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QA checks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QACheck"
    post:
      operationId: createQACheck
      tags: [qa]
      summary: Create or record a QA check
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QACheckInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QACheck"

  /compass/qa-checks/{id}:
    patch:
      operationId: updateQACheck
      tags: [qa]
      summary: Update a QA check result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QACheckUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QACheck"

  /compass/projects/{id}/qa/evaluate:
    post:
      operationId: evaluateProjectQA
      tags: [qa]
      summary: Run the curriculum engine on a project and persist a scored QA report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: A freshly computed and persisted QA report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaReportRecord"
        "404":
          description: Project not found or outside the actor's organization scope

  /compass/projects/{id}/qa/report:
    get:
      operationId: getLatestQAReport
      tags: [qa]
      summary: Get the latest persisted QA report for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The latest persisted QA report, or null if none has been computed
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/QaReportRecord"
                  - type: "null"
        "404":
          description: Project not found or outside the actor's organization scope

  # ── Standards Frameworks ──────────────────────────────────────
  /compass/standards-frameworks:
    get:
      operationId: listStandardsFrameworks
      tags: [standards]
      summary: List all standards frameworks
      responses:
        "200":
          description: Frameworks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandardsFramework"
    post:
      operationId: createStandardsFramework
      tags: [standards]
      summary: Create a standards framework
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardsFrameworkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsFramework"

  /compass/standards-frameworks/{id}/competencies:
    get:
      operationId: listCompetencies
      tags: [standards]
      summary: List competencies for a framework
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Competencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandardCompetency"
    post:
      operationId: createCompetency
      tags: [standards]
      summary: Add a competency to a framework
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardCompetencyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardCompetency"

  /compass/projects/{projectId}/crosswalk:
    get:
      operationId: listCrosswalkLinks
      tags: [standards]
      summary: List standards crosswalk links for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crosswalk links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrosswalkLink"
    post:
      operationId: createCrosswalkLink
      tags: [standards]
      summary: Create a crosswalk link
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrosswalkLinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosswalkLink"

  /compass/crosswalk-links/{id}:
    delete:
      operationId: deleteCrosswalkLink
      tags: [standards]
      summary: Remove a crosswalk link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /compass/projects/{projectId}/crosswalk/gaps:
    get:
      operationId: getCrosswalkGaps
      tags: [standards]
      summary: Get unmapped competency gaps for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gap report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosswalkGapReport"

  # ── Intake progress ───────────────────────────────────────────
  /compass/projects/{projectId}/intake-progress:
    get:
      operationId: getIntakeProgress
      tags: [intake]
      summary: Get saved kickoff/intake progress for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intake progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeProgress"
    put:
      operationId: updateIntakeProgress
      tags: [intake]
      summary: Save kickoff/intake progress for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeProgressInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeProgress"

  /compass/projects/{projectId}/intake-generated-agenda:
    post:
      operationId: generateIntakeAgenda
      tags: [intake]
      summary: Generate a rules-based kickoff agenda from the project, course, and objectives
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated agenda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedAgenda"

  # ── Meeting recordings ───────────────────────────────────────
  /compass/projects/{projectId}/recordings:
    get:
      operationId: listMeetingRecordings
      tags: [recordings]
      summary: List meeting recordings for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recordings
          content:
            application/json:
              schema:
                type: array
                items:
