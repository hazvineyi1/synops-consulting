          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CadenceMilestone"
        "403":
          description: Not your milestone
        "404":
          description: Not found

# ── Component Schemas ───────────────────────────────────────────────
components:
  schemas:
    # ── Auth ──────────────────────────────────────────────────────
    ProductKey:
      type: string
      description: The product/portal a user belongs to.
      enum:
        [hub, cadence, rise, compass, meridian, spark, aria, pulse, sentinel, tend]

    AuthUser:
      type: object
      required: [id, email, name, role, productKey, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        organization:
          type: ["string", "null"]
        role:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"
        createdAt:
          type: string
          format: date-time

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        organization:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    SubmitResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        id:
          type: integer

    # ── Contact & newsletter ──────────────────────────────────────
    ContactInput:
      type: object
      required: [name, email, areaOfInterest, message]
      properties:
        name:
          type: string
        organization:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        areaOfInterest:
          type: string
          enum:
            - "Healthcare & Operations"
            - "Learning, EdTech & AI"
            - "Platforms & SaaS"
            - "Government & Public Sector"
            - "Other"
        message:
          type: string
        website:
          type: string
          description: Honeypot field, leave empty.

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        website:
          type: string
          description: Honeypot field, leave empty.

    # ── Adaptive demo ─────────────────────────────────────────────
    DemoLevelOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    DemoBankItem:
      type: object
      required: [id, difficulty, skill, passage, question, options]
      properties:
        id:
          type: string
        difficulty:
          type: integer
        skill:
          type: string
        passage:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string

    DemoBank:
      type: object
      required: [level, items]
      properties:
        level:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/DemoBankItem"

    DemoAnswerInput:
      type: object
      required: [itemId, optionIndex]
      properties:
        itemId:
          type: string
        optionIndex:
          type: integer

    DemoAnswerResult:
      type: object
      required: [correct, correctIndex]
      properties:
        correct:
          type: boolean
        correctIndex:
          type: integer
        hint:
          type: ["string", "null"]

    DemoPathStep:
      type: object
      required: [itemId, difficulty, correct]
      properties:
        itemId:
          type: string
        difficulty:
          type: integer
        correct:
          type: boolean

    DemoSessionInput:
      type: object
      required: [level, itemsAttempted, correctCount, masteryEstimate, path]
      properties:
        level:
          type: string
          enum: [elementary, secondary, higher]
        itemsAttempted:
          type: integer
        correctCount:
          type: integer
        masteryEstimate:
          type: integer
        finalRung:
          type: string
        path:
          type: array
          items:
            $ref: "#/components/schemas/DemoPathStep"

    # ── Rise (adaptive learning platform) ──────────────────────────
    RiseLevelOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    RiseBankItem:
      type: object
      required: [id, difficulty, skill, passage, question, options]
      properties:
        id:
          type: string
        difficulty:
          type: integer
        skill:
          type: string
        passage:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string

    RiseBank:
      type: object
      required: [level, items]
      properties:
        level:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RiseBankItem"

    RiseAnswerInput:
      type: object
      required: [itemId, optionIndex]
      properties:
        itemId:
          type: string
        optionIndex:
          type: integer

    RiseAnswerResult:
      type: object
      required: [correct, correctIndex]
      properties:
        correct:
          type: boolean
        correctIndex:
          type: integer
        hint:
          type: ["string", "null"]

    RisePathStep:
      type: object
      required: [itemId, difficulty, correct]
      properties:
        itemId:
          type: string
        difficulty:
          type: integer
        correct:
          type: boolean

    RiseSessionInput:
      type: object
      required: [level, itemsAttempted, correctCount, masteryEstimate, path]
      properties:
        level:
          type: string
          enum: [elementary, secondary, higher]
        itemsAttempted:
          type: integer
        correctCount:
          type: integer
        masteryEstimate:
          type: integer
        finalRung:
          type: string
        path:
          type: array
          items:
            $ref: "#/components/schemas/RisePathStep"

    RiseSession:
      type: object
      required:
        [id, level, itemsAttempted, correctCount, masteryEstimate, path, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        level:
          type: string
        itemsAttempted:
          type: integer
        correctCount:
          type: integer
        masteryEstimate:
          type: integer
        finalRung:
          type: ["string", "null"]
        path:
          type: array
          items:
            $ref: "#/components/schemas/RisePathStep"
        createdAt:
          type: string
          format: date-time

    # ── Meridian (provider operations) ────────────────────────────
    Provider:
      type: object
      required:
        [id, name, specialty, region, networkStatus, acceptingPatients, panelSize, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        specialty:
          type: string
        region:
          type: string
        networkStatus:
          type: string
        acceptingPatients:
          type: boolean
        panelSize:
          type: integer
        createdAt:
          type: string
          format: date-time

    NetworkAdequacyReview:
      type: object
      required:
        [id, region, specialty, requiredProviders, actualProviders, status, createdAt]
      properties:
        id:
          type: integer
        region:
          type: string
        specialty:
          type: string
        requiredProviders:
          type: integer
        actualProviders:
          type: integer
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProviderDisputeNote:
      type: object
      required: [author, body, at]
      properties:
        author:
          type: string
        body:
          type: string
        at:
          type: string
          format: date-time

    ProviderDispute:
      type: object
      required: [id, subject, category, status, priority, notes, createdAt, updatedAt]
      properties:
        id:
          type: integer
        providerId:
          type: ["integer", "null"]
        subject:
          type: string
        category:
          type: string
        status:
          type: string
        priority:
          type: string
        notes:
          type: array
          items:
            $ref: "#/components/schemas/ProviderDisputeNote"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DisputeUpdateInput:
      type: object
      properties:
        status:
          type: string
          enum: [Open, In review, Resolved, Escalated]
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
        note:
          type: string

    # ── Client portal ─────────────────────────────────────────────
    Engagement:
      type: object
      required: [id, userId, title, practiceArea, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        practiceArea:
          type: string
        status:
          type: string
        nextMilestone:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PortalResource:
      type: object
      required: [id, title, category, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PortalMessageInput:
      type: object
      required: [subject, message]
      properties:
        subject:
          type: string
        message:
          type: string

    # ── Admin ─────────────────────────────────────────────────────
    AdminUser:
      type: object
      required: [id, email, name, role, productKey, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        organization:
          type: ["string", "null"]
        role:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"
        createdAt:
          type: string
          format: date-time

    ContactSubmission:
      type: object
      required: [id, name, email, areaOfInterest, message, source, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        organization:
          type: ["string", "null"]
        email:
          type: string
        phone:
          type: ["string", "null"]
        areaOfInterest:
          type: string
        message:
          type: string
        source:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Cadence ───────────────────────────────────────────────────
    CadenceEngagement:
      type: object
      required:
        [
          id,
          userId,
          title,
          practiceArea,
          status,
          createdAt,
          milestoneCount,
          deliverableCount,
          completedDeliverableCount,
        ]
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        practiceArea:
          type: string
        status:
          type: string
        nextMilestone:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        milestoneCount:
          type: integer
        deliverableCount:
          type: integer
        completedDeliverableCount:
          type: integer

    CadenceMilestone:
      type: object
      required: [id, engagementId, title, status, orderIndex, createdAt]
      properties:
        id:
          type: integer
        engagementId:
          type: integer
        title:
          type: string
        status:
          type: string
        dueDate:
          type: ["string", "null"]
          format: date-time
        orderIndex:
          type: integer
        createdAt:
          type: string
          format: date-time

    CadenceDeliverable:
      type: object
      required: [id, engagementId, title, status, qaGateStatus, createdAt, updatedAt]
      properties:
        id:
          type: integer
        engagementId:
          type: integer
        milestoneId:
          type: ["integer", "null"]
        title:
          type: string
        status:
          type: string
        qaGateStatus:
          type: string
          description: pending, passed, or failed
        qaNotes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CadenceEngagementDetail:
      type: object
      required: [engagement, milestones, deliverables]
      properties:
        engagement:
          $ref: "#/components/schemas/CadenceEngagement"
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/CadenceMilestone"
        deliverables:
          type: array
          items:
            $ref: "#/components/schemas/CadenceDeliverable"

    DeliverableUpdateInput:
      type: object
      properties:
        status:
          type: string
        qaGateStatus:
          type: string
          enum: [pending, passed, failed]
        qaNotes:
          type: string

    MilestoneUpdateInput:
      type: object
      required: [status]
      properties:
        status:
          type: string

    IntakeProgressInput:
      type: object
      properties:
        agendaChecks:
          type: array
          items:
            type: array
            items:
              type: boolean
        segStatuses:
          type: array
          items:
            type: string
        confirmedPre:
          type: array
          items:
            type: integer
        notes:
          type: object
          additionalProperties:
            type: string
        inventorySelections:
          type: object
          additionalProperties:
            type: string
        autoRules:
          type: object
          additionalProperties:
            type: boolean

    IntakeProgress:
      type: object
      required: [projectId, agendaChecks, segStatuses, confirmedPre, notes, inventorySelections, autoRules]
      properties:
        projectId:
          type: integer
        agendaChecks:
          type: array
          items:
            type: array
            items:
              type: boolean
        segStatuses:
          type: array
          items:
            type: string
        confirmedPre:
          type: array
          items:
            type: integer
        notes:
          type: object
          additionalProperties:
            type: string
        inventorySelections:
          type: object
          additionalProperties:
            type: string
        autoRules:
          type: object
          additionalProperties:
            type: boolean
        updatedAt:
          type: ["string", "null"]
          format: date-time

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ─────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalProjects, activeProjects, projectsByStage, totalClients, gateBlockedCount, overdueCount]
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        projectsByStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
        totalClients:
          type: integer
        gateBlockedCount:
          type: integer
        overdueCount:
          type: integer

    StageCount:
      type: object
      required: [stage, label, count]
      properties:
        stage:
          type: integer
        label:
          type: string
        count:
          type: integer

    ActivityFeedItem:
      type: object
      required: [id, projectId, projectTitle, action, entityType, entityTitle, timestamp]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectTitle:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityTitle:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Client ────────────────────────────────────────────────────
    Client:
