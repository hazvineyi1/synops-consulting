  /compass/meetings/{id}/checklist:
    patch:
      operationId: setMeetingChecklist
      tags: [agenda]
      summary: Toggle a pre-work, standing-agenda, or exit-criteria item on a meeting's plan
      description: >-
        Toggles one item on the meeting's own structured plan: a pre-work
        checklist item, a standing-agenda item (or a single prompt within it via
        promptIndex), or an exit criterion. Applied under a row lock so concurrent
        toggles never lose each other. Exit criteria are advisory only; marking
        them does not gate any server action and completion is allowed with unmet
        criteria.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingChecklistToggle"
