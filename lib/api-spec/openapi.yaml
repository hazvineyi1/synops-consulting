openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UVA Production Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: projects
    description: Project pipeline management
  - name: courses
    description: Course and module structure
  - name: objectives
    description: Objectives cascade
  - name: assessments
    description: Assessments and activities
  - name: ledger
    description: Evidence Ledger
  - name: qa
    description: QA and accessibility
  - name: standards
    description: Standards frameworks and accreditation crosswalk
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

