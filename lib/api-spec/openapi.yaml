openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UVA Production Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: projects
    description: Project pipeline management
  - name: courses
    description: Course and module structure
  - name: objectives
    description: Objectives cascade
  - name: assessments
    description: Assessments and activities
  - name: ledger
    description: Evidence Ledger
  - name: qa
    description: QA and accessibility
  - name: standards
    description: Standards frameworks and accreditation crosswalk
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ───────────────────────────────────────────────
  /compass/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /compass/dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityFeedItem"

  # ── Clients ──────────────────────────────────────────────────
  /compass/clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /compass/clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  # ── Projects ─────────────────────────────────────────────────
  /compass/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /compass/projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /compass/projects/{id}/advance-stage:
    post:
      operationId: advanceProjectStage
      tags: [projects]
      summary: Advance the project to the next pipeline stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageAdvanceInput"
      responses:
        "200":
          description: Stage advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Gate requirements not met

  /compass/projects/{id}/gate-status:
    get:
      operationId: getProjectGateStatus
      tags: [projects]
      summary: Get gate requirements and status for the current stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateStatus"

  # ── Courses ───────────────────────────────────────────────────
  /compass/projects/{projectId}/courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /compass/courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  # ── Modules ───────────────────────────────────────────────────
  /compass/courses/{courseId}/modules:
    get:
      operationId: listModules
      tags: [courses]
      summary: List modules for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"
    post:
      operationId: createModule
      tags: [courses]
      summary: Create a module for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"

  /compass/modules/{id}:
    patch:
      operationId: updateModule
      tags: [courses]
      summary: Update a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
    delete:
      operationId: deleteModule
      tags: [courses]
      summary: Delete a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Objectives Cascade ────────────────────────────────────────
  /compass/projects/{projectId}/objectives:
    get:
      operationId: listObjectives
      tags: [objectives]
      summary: List objectives for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Objectives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Objective"
    post:
      operationId: createObjective
      tags: [objectives]
      summary: Create an objective
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectiveInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Objective"

  /compass/objectives/{id}:
    patch:
      operationId: updateObjective
      tags: [objectives]
      summary: Update an objective
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectiveUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Objective"
    delete:
      operationId: deleteObjective
      tags: [objectives]
      summary: Delete an objective
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Assessments ───────────────────────────────────────────────
  /compass/courses/{courseId}/assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List assessments for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Create an assessment
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"

  /compass/assessments/{id}:
    patch:
      operationId: updateAssessment
      tags: [assessments]
      summary: Update an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
    delete:
      operationId: deleteAssessment
      tags: [assessments]
      summary: Delete an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Activities ────────────────────────────────────────────────
  /compass/courses/{courseId}/activities:
    get:
      operationId: listActivities
      tags: [assessments]
      summary: List activities for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [assessments]
      summary: Create an activity
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /compass/activities/{id}:
    patch:
      operationId: updateActivity
      tags: [assessments]
      summary: Update an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [assessments]
      summary: Delete an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Evidence Ledger ───────────────────────────────────────────
  /compass/projects/{projectId}/ledger:
    get:
      operationId: listLedgerEntries
      tags: [ledger]
      summary: List evidence ledger entries for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"
    post:
      operationId: createLedgerEntry
      tags: [ledger]
      summary: Create an evidence ledger entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LedgerEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  /compass/projects/{projectId}/ledger/report:
    get:
      operationId: getLedgerReport
      tags: [ledger]
      summary: Generate proof artifacts from the evidence ledger
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerReport"

  # ── QA & Accessibility ────────────────────────────────────────
  /compass/projects/{projectId}/qa:
    get:
      operationId: listQAChecks
      tags: [qa]
      summary: List QA checks for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QA checks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QACheck"
    post:
      operationId: createQACheck
      tags: [qa]
      summary: Create or record a QA check
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QACheckInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QACheck"

  /compass/qa-checks/{id}:
    patch:
      operationId: updateQACheck
      tags: [qa]
      summary: Update a QA check result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QACheckUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QACheck"

  # ── Standards Frameworks ──────────────────────────────────────
  /compass/standards-frameworks:
    get:
      operationId: listStandardsFrameworks
      tags: [standards]
      summary: List all standards frameworks
      responses:
        "200":
          description: Frameworks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandardsFramework"
    post:
      operationId: createStandardsFramework
      tags: [standards]
      summary: Create a standards framework
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardsFrameworkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardsFramework"

  /compass/standards-frameworks/{id}/competencies:
    get:
      operationId: listCompetencies
      tags: [standards]
      summary: List competencies for a framework
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Competencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandardCompetency"
    post:
      operationId: createCompetency
      tags: [standards]
      summary: Add a competency to a framework
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardCompetencyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardCompetency"

  /compass/projects/{projectId}/crosswalk:
    get:
      operationId: listCrosswalkLinks
      tags: [standards]
      summary: List standards crosswalk links for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crosswalk links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrosswalkLink"
    post:
      operationId: createCrosswalkLink
      tags: [standards]
      summary: Create a crosswalk link
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrosswalkLinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosswalkLink"

  /compass/crosswalk-links/{id}:
    delete:
      operationId: deleteCrosswalkLink
      tags: [standards]
      summary: Remove a crosswalk link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /compass/projects/{projectId}/crosswalk/gaps:
    get:
      operationId: getCrosswalkGaps
      tags: [standards]
      summary: Get unmapped competency gaps for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gap report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosswalkGapReport"

  # ── Intake progress ───────────────────────────────────────────
  /compass/projects/{projectId}/intake-progress:
    get:
      operationId: getIntakeProgress
      tags: [intake]
      summary: Get saved kickoff/intake progress for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intake progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeProgress"
    put:
      operationId: updateIntakeProgress
      tags: [intake]
      summary: Save kickoff/intake progress for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeProgressInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeProgress"

  # ── Builders (school admin management) ───────────────────────
  /compass/builders:
    get:
      operationId: listBuilders
      tags: [builders]
      summary: List builders the actor manages
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of builders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Builder"
    post:
      operationId: createBuilder
      tags: [builders]
      summary: Provision a builder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuilderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Builder"

  /compass/builders/{id}/status:
    patch:
      operationId: updateBuilderStatus
      tags: [builders]
      summary: Activate or deactivate a builder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBuilderStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Builder"

  /compass/builders/{id}/password:
    post:
      operationId: resetBuilderPassword
      tags: [builders]
      summary: Reset a builder's password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetBuilderPasswordInput"
      responses:
        "200":
          description: Reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /compass/builders/{id}/activity:
    get:
      operationId: getBuilderActivity
      tags: [builders]
      summary: Per-builder activity feed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Builder activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityFeedItem"

  # ── Allocations ──────────────────────────────────────────────
  /compass/allocations:
    get:
      operationId: listAllocations
      tags: [allocations]
      summary: List allocations the actor manages
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
        - name: builderUserId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Allocation"
    post:
      operationId: createAllocation
      tags: [allocations]
      summary: Allocate a builder to a scope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllocationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"

  /compass/allocations/{id}/revoke:
    patch:
      operationId: revokeAllocation
      tags: [allocations]
      summary: Revoke an allocation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"

  /compass/my/allocations:
    get:
      operationId: getMyAllocations
      tags: [allocations]
      summary: The caller's own active allocations
      responses:
        "200":
          description: Active allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Allocation"

  # ── Classes ──────────────────────────────────────────────────
  /compass/courses/{courseId}/classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List classes under a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a class under a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /compass/classes/{id}:
    patch:
      operationId: updateClass
      tags: [classes]
      summary: Update a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  # ── School report ────────────────────────────────────────────
  /compass/school/report:
    get:
      operationId: getSchoolReport
      tags: [school]
      summary: Organization curriculum and builder rollup
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: School report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolReport"

  /compass/school/report.md:
    get:
      operationId: getSchoolReportMarkdown
      tags: [school]
      summary: School report as downloadable markdown
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: School report markdown
          content:
            text/markdown:
              schema:
                type: string

  # ── Super-admin console: cross-organization analytics ────────
  /compass/admin/overview:
    get:
      operationId: getPlatformOverview
      tags: [admin]
      summary: Cross-organization platform overview (global roles only)
      responses:
        "200":
          description: Platform overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOverview"

  /compass/admin/report.md:
    get:
      operationId: getPlatformReportMarkdown
      tags: [admin]
      summary: Platform overview as downloadable markdown (global roles only)
      responses:
        "200":
          description: Platform report markdown
          content:
            text/markdown:
              schema:
                type: string

  /compass/stats/scope:
    get:
      operationId: getScopeStats
      tags: [admin]
      summary: Rollup statistics for a single curriculum scope
      parameters:
        - name: scopeType
          in: query
          required: true
          schema:
            type: string
            enum: [project, course, class]
        - name: scopeId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scope statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopeStats"

  /compass/admin/users:
    get:
      operationId: getPlatformUsers
      tags: [admin]
      summary: User directory across all organizations (global roles only)
      responses:
        "200":
          description: Platform user directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformUser"

  # ── White-label branding management ──────────────────────────
  /compass/admin/organizations/{id}/branding:
    patch:
      operationId: updateOrganizationBranding
      tags: [admin]
      summary: Update an organization's white-label branding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandingInput"
      responses:
        "200":
          description: Updated branding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationBranding"

  # ── Impersonation (top-level, not gated to one product) ──────
  /impersonation/start:
    post:
      operationId: startImpersonation
      tags: [impersonation]
      summary: Begin impersonating a user (super admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartImpersonationInput"
      responses:
        "200":
          description: Impersonation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /impersonation/stop:
    post:
      operationId: stopImpersonation
      tags: [impersonation]
      summary: Stop impersonating and restore your own session
      responses:
        "200":
          description: Impersonation stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ── White-label branding (public, host-resolved) ─────────────
  /branding:
    get:
      operationId: getBranding
      tags: [branding]
      summary: Resolve white-label branding for the requesting host
      description: >-
        Public. Resolves branding by the request host only; the host never
        authorizes anything. Returns a neutral (unbranded) response when the
        host does not match a configured organization domain.
      responses:
        "200":
          description: Branding for the host (neutral when unmatched)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandingResponse"

  # ── Auth ─────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new client account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  # ── Contact & newsletter ─────────────────────────────────────
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [contact]
      summary: Subscribe to the newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ── Adaptive demo ────────────────────────────────────────────
  /demo/levels:
    get:
      operationId: getDemoLevels
      tags: [demo]
      summary: List available reading levels
      responses:
        "200":
          description: Levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemoLevelOption"

  /demo/bank:
    get:
      operationId: getDemoBank
      tags: [demo]
      summary: Get the item bank for a level (no answer keys)
      parameters:
        - name: level
          in: query
          required: true
          schema:
            type: string
            enum: [elementary, secondary, higher]
      responses:
        "200":
          description: Item bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoBank"

  /demo/answer:
    post:
      operationId: answerDemoItem
      tags: [demo]
      summary: Grade a single demo answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoAnswerInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoAnswerResult"

  /demo/sessions:
    post:
      operationId: saveDemoSession
      tags: [demo]
      summary: Persist an anonymous completed demo run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoSessionInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

# ── Component Schemas ───────────────────────────────────────────────
components:
  schemas:
    # ── Auth ──────────────────────────────────────────────────────
    ProductKey:
      type: string
      description: The product/portal a user belongs to.
      enum:
        [compass]

    AuthUser:
      type: object
      required: [id, email, name, role, productKey, status, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        organization:
          type: ["string", "null"]
        role:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"
        status:
          type: string
          description: Account lifecycle status (active or deactivated).
        organizationId:
          type: ["integer", "null"]
        organizationName:
          type: ["string", "null"]
        organizationType:
          type: ["string", "null"]
        organizationSlug:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        impersonator:
          anyOf:
            - $ref: "#/components/schemas/Impersonator"
            - type: "null"
          description: >-
            When set, the real super admin currently impersonating this user.
            Null during a normal session.

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        organization:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    SubmitResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        id:
          type: integer

    # ── Contact & newsletter ──────────────────────────────────────
    ContactInput:
      type: object
      required: [name, email, areaOfInterest, message]
      properties:
        name:
          type: string
        organization:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        areaOfInterest:
          type: string
          enum:
            - "Healthcare & Operations"
            - "Learning, EdTech & AI"
            - "Platforms & SaaS"
            - "Government & Public Sector"
            - "Other"
        message:
          type: string
        website:
          type: string
          description: Honeypot field, leave empty.

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        website:
          type: string
          description: Honeypot field, leave empty.

    # ── Adaptive demo ─────────────────────────────────────────────
    DemoLevelOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    DemoBankItem:
      type: object
      required: [id, difficulty, skill, passage, question, options]
      properties:
        id:
          type: string
        difficulty:
          type: integer
        skill:
          type: string
        passage:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string

    DemoBank:
      type: object
      required: [level, items]
      properties:
        level:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/DemoBankItem"

    DemoAnswerInput:
      type: object
      required: [itemId, optionIndex]
      properties:
        itemId:
          type: string
        optionIndex:
          type: integer

    DemoAnswerResult:
      type: object
      required: [correct, correctIndex]
      properties:
        correct:
          type: boolean
        correctIndex:
          type: integer
        hint:
          type: ["string", "null"]

    DemoPathStep:
      type: object
      required: [itemId, difficulty, correct]
      properties:
        itemId:
          type: string
        difficulty:
          type: integer
        correct:
          type: boolean

    DemoSessionInput:
      type: object
      required: [level, itemsAttempted, correctCount, masteryEstimate, path]
      properties:
        level:
          type: string
          enum: [elementary, secondary, higher]
        itemsAttempted:
          type: integer
        correctCount:
          type: integer
        masteryEstimate:
          type: integer
        finalRung:
          type: string
        path:
          type: array
          items:
            $ref: "#/components/schemas/DemoPathStep"

    IntakeProgressInput:
      type: object
      properties:
        agendaChecks:
          type: array
          items:
            type: array
            items:
              type: boolean
        segStatuses:
          type: array
          items:
            type: string
        confirmedPre:
          type: array
          items:
            type: integer
        notes:
          type: object
          additionalProperties:
            type: string
        inventorySelections:
          type: object
          additionalProperties:
            type: string
        autoRules:
          type: object
          additionalProperties:
            type: boolean

    IntakeProgress:
      type: object
      required: [projectId, agendaChecks, segStatuses, confirmedPre, notes, inventorySelections, autoRules]
      properties:
        projectId:
          type: integer
        agendaChecks:
          type: array
          items:
            type: array
            items:
              type: boolean
        segStatuses:
          type: array
          items:
            type: string
        confirmedPre:
          type: array
          items:
            type: integer
        notes:
          type: object
          additionalProperties:
            type: string
        inventorySelections:
          type: object
          additionalProperties:
            type: string
        autoRules:
          type: object
          additionalProperties:
            type: boolean
        updatedAt:
          type: ["string", "null"]
          format: date-time

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ─────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalProjects, activeProjects, projectsByStage, totalClients, gateBlockedCount, overdueCount]
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        projectsByStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
        totalClients:
          type: integer
        gateBlockedCount:
          type: integer
        overdueCount:
          type: integer

    StageCount:
      type: object
      required: [stage, label, count]
      properties:
        stage:
          type: integer
        label:
          type: string
        count:
          type: integer

    ActivityFeedItem:
      type: object
      required: [id, projectId, projectTitle, action, entityType, entityTitle, timestamp]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectTitle:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityTitle:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Client ────────────────────────────────────────────────────
    Client:
      type: object
      required: [id, organizationId, name, createdAt]
      properties:
        id:
          type: integer
        organizationId:
          type: integer
          description: Owning organization (tenant). Set by the server on creation.
        name:
          type: string
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        institution:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        projectCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        contactEmail:
          type: string
        institution:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        contactEmail:
          type: string
        institution:
          type: string
        notes:
          type: string

    # ── Project ───────────────────────────────────────────────────
    Project:
      type: object
      required: [id, clientId, title, stage, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        title:
          type: string
        stage:
          type: integer
          description: "0=Kickoff/Intake, 1=Backward Design, 2=QA, 3=Handoff"
        status:
          type: string
          description: "active | paused | complete | gate_blocked"
        tier:
          type: ["string", "null"]
        modality:
          type: ["string", "null"]
        lms:
          type: ["string", "null"]
          description: "Learning management system (Canvas, Blackboard, Moodle, D2L Brightspace, Schoology, other)"
        description:
          type: ["string", "null"]
        targetDeliveryDate:
          type: ["string", "null"]
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [clientId, title]
      properties:
        clientId:
          type: integer
        title:
          type: string
          minLength: 1
        description:
          type: string
        tier:
          type: string
        modality:
          type: string
        lms:
          type: string
          description: "Target LMS platform"
        targetDeliveryDate:
          type: string
          format: date

    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        tier:
          type: string
        modality:
          type: string
        lms:
          type: string
        targetDeliveryDate:
          type: string
          format: date

    StageAdvanceInput:
      type: object
      required: [notes]
      properties:
        notes:
          type: string

    GateStatus:
      type: object
      required: [stage, canAdvance, requirements]
      properties:
        stage:
          type: integer
        canAdvance:
          type: boolean
        requirements:
          type: array
          items:
            $ref: "#/components/schemas/GateRequirement"

    GateRequirement:
      type: object
      required: [label, met, blocking]
      properties:
        label:
          type: string
        met:
          type: boolean
        blocking:
          type: boolean
        detail:
          type: ["string", "null"]

    # ── Course ────────────────────────────────────────────────────
    Course:
      type: object
      required: [id, projectId, title, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        creditHours:
          type: ["integer", "null"]
        termWeeks:
          type: ["integer", "null"]
        moduleCount:
          type: ["integer", "null"]
        modality:
          type: ["string", "null"]
        accreditors:
          type: ["string", "null"]
          description: "Comma-separated accreditor names/acronyms"
        seatTimeHours:
          type: ["number", "null"]
        courseDescription:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CourseInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        creditHours:
          type: integer
        termWeeks:
          type: integer
        moduleCount:
          type: integer
        modality:
          type: string
        accreditors:
          type: string
        seatTimeHours:
          type: number
        courseDescription:
          type: string

    CourseUpdate:
      type: object
      properties:
        title:
          type: string
        creditHours:
          type: integer
        termWeeks:
          type: integer
        moduleCount:
          type: integer
        modality:
          type: string
        accreditors:
          type: string
        seatTimeHours:
          type: number
        courseDescription:
          type: string

    # ── Module ────────────────────────────────────────────────────
    Module:
      type: object
      required: [id, courseId, title, position, createdAt]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        position:
          type: integer
        weekNumber:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
          description: "draft | in_progress | complete | approved"
        isPrototype:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ModuleInput:
      type: object
      required: [title, position]
      properties:
        title:
          type: string
          minLength: 1
        position:
          type: integer
        weekNumber:
          type: integer
        description:
          type: string
        isPrototype:
          type: boolean

    ModuleUpdate:
      type: object
      properties:
        title:
          type: string
        position:
          type: integer
        weekNumber:
          type: integer
        description:
          type: string
        status:
          type: string
        isPrototype:
          type: boolean

    # ── Objective ─────────────────────────────────────────────────
    Objective:
      type: object
      required: [id, projectId, level, text, createdAt]
