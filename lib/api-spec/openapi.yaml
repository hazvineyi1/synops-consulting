                $ref: "#/components/schemas/SchoolReport"

  /compass/school/report.md:
    get:
      operationId: getSchoolReportMarkdown
      tags: [school]
      summary: School report as downloadable markdown
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: School report markdown
          content:
            text/markdown:
              schema:
                type: string

  # ── Super-admin console: cross-organization analytics ────────
  /compass/admin/overview:
    get:
      operationId: getPlatformOverview
      tags: [admin]
      summary: Cross-organization platform overview (global roles only)
      responses:
        "200":
          description: Platform overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOverview"

  /compass/admin/report.md:
    get:
      operationId: getPlatformReportMarkdown
      tags: [admin]
      summary: Platform overview as downloadable markdown (global roles only)
      responses:
        "200":
          description: Platform report markdown
          content:
            text/markdown:
              schema:
                type: string

  /compass/stats/scope:
    get:
      operationId: getScopeStats
      tags: [admin]
      summary: Rollup statistics for a single curriculum scope
      parameters:
        - name: scopeType
          in: query
          required: true
          schema:
            type: string
            enum: [project, course, class]
        - name: scopeId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scope statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopeStats"

  /compass/admin/users:
    get:
      operationId: getPlatformUsers
      tags: [admin]
      summary: User directory across all organizations (global roles only)
      responses:
        "200":
          description: Platform user directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformUser"

  /compass/admin/organizations:
    get:
      operationId: listOrganizations
      tags: [admin]
      summary: Organization directory (global roles only)
      responses:
        "200":
          description: Organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationSummary"

  # ── White-label branding management ──────────────────────────
  /compass/admin/organizations/{id}/branding:
    patch:
      operationId: updateOrganizationBranding
      tags: [admin]
      summary: Update an organization's white-label branding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandingInput"
      responses:
        "200":
          description: Updated branding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationBranding"

  # ── Impersonation (top-level, not gated to one product) ──────
  /impersonation/start:
    post:
      operationId: startImpersonation
      tags: [impersonation]
      summary: Begin impersonating a user (super admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartImpersonationInput"
      responses:
        "200":
          description: Impersonation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /impersonation/stop:
    post:
      operationId: stopImpersonation
      tags: [impersonation]
      summary: Stop impersonating and restore your own session
      responses:
        "200":
          description: Impersonation stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ── White-label branding (public, host-resolved) ─────────────
  /branding:
    get:
      operationId: getBranding
      tags: [branding]
      summary: Resolve white-label branding for the requesting host
      description: >-
        Public. Resolves branding by the request host only; the host never
        authorizes anything. Returns a neutral (unbranded) response when the
        host does not match a configured organization domain.
      responses:
        "200":
          description: Branding for the host (neutral when unmatched)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandingResponse"

  # ── Auth ─────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Start a free trial (sends a verification email)
      description: >-
        Creates an unverified account and emails a verification link. No session
        is established and the trial clock does not start until the email is
        verified. Always returns the same shape whether or not the email already
        existed, to avoid account enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "202":
          description: Verification email sent (if the address is eligible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify an email address and start the trial
      description: >-
        Consumes a single-use verification token, marks the account verified,
        starts the 14 day trial, provisions the first client, and establishes a
        session. Returns the authenticated user on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Verified and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid or expired token

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Resend a verification email
      description: >-
        Sends a fresh verification link if the address belongs to an unverified
        account. Always returns the same shape to avoid account enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "202":
          description: Verification email sent (if the address is eligible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  # ── Contact & newsletter ─────────────────────────────────────
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [contact]
      summary: Subscribe to the newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ── Adaptive demo ────────────────────────────────────────────
  /demo/levels:
    get:
      operationId: getDemoLevels
      tags: [demo]
      summary: List available reading levels
      responses:
        "200":
          description: Levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemoLevelOption"

  /demo/bank:
    get:
      operationId: getDemoBank
      tags: [demo]
      summary: Get the item bank for a level (no answer keys)
      parameters:
        - name: level
          in: query
          required: true
          schema:
            type: string
            enum: [elementary, secondary, higher]
      responses:
        "200":
          description: Item bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoBank"

  /demo/answer:
    post:
      operationId: answerDemoItem
      tags: [demo]
      summary: Grade a single demo answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoAnswerInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoAnswerResult"

  /demo/sessions:
    post:
      operationId: saveDemoSession
      tags: [demo]
      summary: Persist an anonymous completed demo run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoSessionInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

  /demo/curriculum-sessions:
    post:
      operationId: saveCurriculumDemoSession
      tags: [demo]
      summary: Persist an anonymous curriculum builder demo run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurriculumDemoSessionInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

  /demo/leads:
    post:
      operationId: submitDemoLead
      tags: [demo]
      summary: Capture an opt-in demo lead and notify the team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoLeadInput"
      responses:
        "201":
          description: Received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

  # ── Object storage ───────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL to upload a file directly to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL and the object path to persist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve an uploaded object entity (auth + ACL enforced server-side)
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or not accessible

  # ── Billing ───────────────────────────────────────────────────
  /compass/billing/subscription:
    get:
      operationId: getBillingSubscription
      tags: [billing]
      summary: The acting organization's current plan, status, and usage
      responses:
        "200":
          description: Subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscription"

  /compass/billing/checkout:
    post:
      operationId: createBillingCheckout
      tags: [billing]
      summary: Start a Stripe Checkout session to subscribe the organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutInput"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingRedirect"

  /compass/billing/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      summary: Open the Stripe billing portal for the organization
      responses:
        "200":
          description: Billing portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingRedirect"

  /compass/billing/reconcile:
    post:
      operationId: reconcileBilling
      tags: [billing]
      summary: Pull the latest subscription state from Stripe after checkout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingReconcileInput"
      responses:
        "200":
          description: Updated subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscription"

# ── Component Schemas ───────────────────────────────────────────────
components:
  schemas:
    # ── Auth ──────────────────────────────────────────────────────
    ProductKey:
      type: string
      description: The product/portal a user belongs to.
      enum:
        [compass]

    AuthUser:
      type: object
      required: [id, email, name, role, productKey, status, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        organization:
          type: ["string", "null"]
        role:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"
        status:
          type: string
          description: Account lifecycle status (active or deactivated).
        organizationId:
          type: ["integer", "null"]
        organizationName:
          type: ["string", "null"]
        organizationType:
          type: ["string", "null"]
        organizationSlug:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        impersonator:
          anyOf:
            - $ref: "#/components/schemas/Impersonator"
            - type: "null"
          description: >-
            When set, the real super admin currently impersonating this user.
            Null during a normal session.
        effectiveTier:
          type: string
          description: >-
            The actor's current entitled plan tier (e.g. trial, starter,
            enterprise). Presentational only; never authorizes anything.
        planLabel:
          type: string
          description: Human-readable label for the effective plan tier.
        trialEndsAt:
          type: ["string", "null"]
          format: date-time
          description: When the free trial ends, or null when not on a trial.
        trialDaysRemaining:
          type: ["integer", "null"]
          description: >-
            Whole days left in the trial (0 once lapsed), or null when not on a
            trial. Display only.
        readOnly:
          type: boolean
          description: >-
            True when the tenant may view but not create or edit (e.g. an expired
            trial). Advisory only; the server enforces writes independently.

    RegisterResponse:
      type: object
      required: [ok, email, verificationRequired]
      properties:
        ok:
          type: boolean
        email:
          type: string
          format: email
          description: The address the verification link was sent to.
        verificationRequired:
          type: boolean
          description: >-
            True when the account was created unverified and a verification link
            was sent (no session established). False only when email verification
            is disabled by the server kill-switch, in which case the trial has
            already started and a session was established.

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        organization:
          type: string
        productKey:
          $ref: "#/components/schemas/ProductKey"

    VerifyEmailInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ResendVerificationInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    # ── Billing ───────────────────────────────────────────────────
    PlanFeatures:
      type: object
      required: [whiteLabel, multiAccreditorExport, customDomain]
      properties:
        whiteLabel:
          type: boolean
        multiAccreditorExport:
          type: boolean
        customDomain:
          type: boolean

    BillingCheckoutInput:
      type: object
      required: [tier, interval]
      properties:
        tier:
          type: string
          enum: [starter, professional, enterprise]
        interval:
          type: string
          enum: [month, year]

    BillingReconcileInput:
      type: object
      properties:
        sessionId:
          type: string
          description: A Stripe Checkout Session id to reconcile after redirect.

    BillingRedirect:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: A Stripe-hosted URL to redirect the browser to.

    BillingSubscription:
      type: object
      required:
        [
          tier,
          planLabel,
          planTier,
          subscriptionStatus,
          activeCourseLimit,
          activeCourseCount,
          features,
          trialExpired,
          hasStripeCustomer,
        ]
      properties:
        tier:
          type: string
          description: The effective entitlement tier the org currently has.
          enum: [trial, starter, professional, enterprise]
        planLabel:
          type: string
        planTier:
          type: string
          description: The raw purchased tier stored on the org.
        subscriptionStatus:
          type: string
        trialEndsAt:
          type: ["string", "null"]
          format: date-time
        currentPeriodEnd:
          type: ["string", "null"]
          format: date-time
        activeCourseLimit:
          type: ["integer", "null"]
        activeCourseCount:
          type: integer
        features:
          $ref: "#/components/schemas/PlanFeatures"
        trialExpired:
          type: boolean
        hasStripeCustomer:
          type: boolean

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    SubmitResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        id:
          type: integer

    # ── Contact & newsletter ──────────────────────────────────────
    ContactInput:
      type: object
      required: [name, email, areaOfInterest, message]
      properties:
        name:
          type: string
        organization:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        areaOfInterest:
          type: string
          enum:
            - "Healthcare & Operations"
            - "Learning, EdTech & AI"
            - "Platforms & SaaS"
            - "Other"
        message:
          type: string
        website:
          type: string
          description: Honeypot field, leave empty.

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        website:
          type: string
          description: Honeypot field, leave empty.

    # ── Adaptive demo ─────────────────────────────────────────────
    DemoLevelOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    DemoBankItem:
      type: object
      required: [id, difficulty, skill, passage, question, options]
      properties:
        id:
          type: string
        difficulty:
          type: integer
        skill:
          type: string
        passage:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string

    DemoBank:
      type: object
      required: [level, items]
      properties:
        level:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/DemoBankItem"

    DemoAnswerInput:
      type: object
      required: [itemId, optionIndex]
      properties:
        itemId:
          type: string
        optionIndex:
          type: integer

    DemoAnswerResult:
      type: object
      required: [correct, correctIndex]
      properties:
        correct:
          type: boolean
        correctIndex:
          type: integer
        hint:
          type: ["string", "null"]

    DemoPathStep:
      type: object
      required: [itemId, difficulty, correct]
      properties:
        itemId:
          type: string
        difficulty:
          type: integer
        correct:
          type: boolean

    DemoSessionInput:
      type: object
      required: [level, itemsAttempted, correctCount, masteryEstimate, path]
      properties:
        level:
          type: string
          enum: [elementary, secondary, higher]
        itemsAttempted:
          type: integer
        correctCount:
          type: integer
        masteryEstimate:
          type: integer
        finalRung:
          type: string
        path:
          type: array
          items:
            $ref: "#/components/schemas/DemoPathStep"

    CurriculumDemoSessionInput:
      type: object
      required: [objectiveCount, assessmentCount, qaScore, stageReached]
      properties:
        courseTitle:
          type: string
        gradeBand:
          type: string
        objectiveCount:
          type: integer
        assessmentCount:
          type: integer
        qaScore:
          type: integer
        stageReached:
          type: string
          enum: [qa, handoff]

    DemoLeadInput:
      type: object
      required: [name, email, demo]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        organization:
          type: string
        demo:
          type: string
          enum: [curriculum, reading]
        summary:
          type: string
        website:
          type: string
          description: Honeypot field, leave empty.

    IntakeProgressInput:
      type: object
      properties:
        agendaChecks:
          type: array
          items:
            type: array
            items:
              type: boolean
        segStatuses:
          type: array
          items:
            type: string
        confirmedPre:
          type: array
          items:
            type: integer
        notes:
          type: object
          additionalProperties:
            type: string
        inventorySelections:
          type: object
          additionalProperties:
            type: string
        autoRules:
          type: object
          additionalProperties:
            type: boolean
        kickoffAnswers:
          $ref: "#/components/schemas/KickoffState"

    IntakeProgress:
      type: object
      required: [projectId, agendaChecks, segStatuses, confirmedPre, notes, inventorySelections, autoRules]
      properties:
        projectId:
          type: integer
        agendaChecks:
          type: array
          items:
            type: array
            items:
              type: boolean
        segStatuses:
          type: array
          items:
            type: string
        confirmedPre:
          type: array
          items:
            type: integer
        notes:
          type: object
          additionalProperties:
            type: string
        inventorySelections:
          type: object
          additionalProperties:
            type: string
        autoRules:
          type: object
          additionalProperties:
            type: boolean
        kickoffAnswers:
          $ref: "#/components/schemas/KickoffState"
        generatedAgenda:
          oneOf:
            - $ref: "#/components/schemas/GeneratedAgenda"
            - type: "null"
        updatedAt:
          type: ["string", "null"]
          format: date-time

    KickoffAnswer:
      type: object
      required: [nodeId, prompt, value, label]
      properties:
        nodeId:
          type: string
        prompt:
          type: string
        value:
          type: string
        label:
          type: string

    KickoffState:
      type: object
      description: "Interactive Socratic kickoff answers (rules-based). An empty object means not started."
      properties:
        version:
          type: integer
        designMethod:
          type: ["string", "null"]
        currentNodeId:
          type: ["string", "null"]
        completed:
          type: boolean
        answers:
          type: array
          items:
            $ref: "#/components/schemas/KickoffAnswer"
        summary:
          type: array
          items:
            type: string

    GeneratedAgendaItem:
      type: object
      required: [title, minutes, prompts]
      properties:
        title:
          type: string
        minutes:
          type: integer
        prompts:
          type: array
          items:
            type: string

    GeneratedAgenda:
      type: object
      required: [generatedAt, projectTitle, totalMinutes, items]
      properties:
        generatedAt:
          type: string
          format: date-time
        projectTitle:
          type: string
        courseTitle:
          type: ["string", "null"]
        objectiveCount:
          type: integer
        totalMinutes:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedAgendaItem"

    # ── Meeting recordings ────────────────────────────────────────
    MeetingRecording:
      type: object
      required: [id, projectId, kind, title, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        meetingId:
          type: ["integer", "null"]
          description: The meeting this recording belongs to, when scoped to one.
        kind:
          type: string
          enum: [upload, external]
        title:
          type: string
        objectPath:
          type: ["string", "null"]
        externalUrl:
          type: ["string", "null"]
        durationSec:
          type: ["integer", "null"]
        contentType:
          type: ["string", "null"]
        sizeBytes:
          type: ["integer", "null"]
        transcript:
          type: ["string", "null"]
          description: Speech-to-text transcript, present after transcription.
        draftNotes:
          type: ["string", "null"]
          description: AI-drafted meeting notes derived from the transcript.
        transcribedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    MeetingRecordingInput:
      type: object
      required: [kind, title]
      properties:
        meetingId:
          type: integer
          description: Optional meeting to scope this recording to (must belong to the project).
        kind:
          type: string
          enum: [upload, external]
        title:
          type: string
          minLength: 1
          maxLength: 200
        objectPath:
          type: string
          description: Required when kind is "upload"; the path returned by the upload endpoint.
        externalUrl:
          type: string
          description: Required when kind is "external"; an http(s) link to the recording.
        durationSec:
          type: integer
          minimum: 0
        contentType:
          type: string
        sizeBytes:
          type: integer
          minimum: 0

    # ── Time tracking (per-project billing time entries) ──────────
    TimeEntry:
      type: object
      required: [id, projectId, userId, source, startedAt, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        source:
          type: string
          enum: [timer, manual]
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time
        durationSeconds:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    TimeEntryInput:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [timer, manual]
          description: timer starts a running stopwatch now; manual logs a completed entry and requires minutes.
        description:
          type: string
          maxLength: 500
        minutes:
          type: integer
          minimum: 1
          maximum: 1440
          description: Required when kind is manual; total minutes worked.
        spentOn:
          type: string
          format: date
          description: Optional when kind is manual; the date the work happened (defaults to today).

    TimeEntryUpdate:
      type: object
      properties:
        description:
          type: ["string", "null"]
          maxLength: 500
        minutes:
          type: integer
          minimum: 1
          maximum: 1440
        spentOn:
          type: string
          format: date

