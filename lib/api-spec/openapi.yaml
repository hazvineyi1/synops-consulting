      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crosswalk links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrosswalkLink"
    post:
      operationId: createCrosswalkLink
      tags: [standards]
      summary: Create a crosswalk link
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrosswalkLinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosswalkLink"

  /crosswalk-links/{id}:
    delete:
      operationId: deleteCrosswalkLink
      tags: [standards]
      summary: Remove a crosswalk link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/crosswalk/gaps:
    get:
      operationId: getCrosswalkGaps
      tags: [standards]
      summary: Get unmapped competency gaps for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gap report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosswalkGapReport"

  # ── Intake progress ───────────────────────────────────────────
  /projects/{projectId}/intake-progress:
    get:
      operationId: getIntakeProgress
      tags: [intake]
      summary: Get saved kickoff/intake progress for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intake progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeProgress"
    put:
      operationId: updateIntakeProgress
      tags: [intake]
      summary: Save kickoff/intake progress for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeProgressInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeProgress"

  # ── Auth ─────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new client account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
