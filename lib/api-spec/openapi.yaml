          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /compass/meeting-recordings/{id}/transcribe:
    post:
      operationId: transcribeMeetingRecording
      tags: [recordings]
      summary: Transcribe an uploaded recording and draft meeting notes from it
      description: >
        Transcribes the audio of an uploaded recording (speech-to-text) and
        drafts clean meeting notes from the transcript using AI. Only uploaded
        recordings are supported. Requires the AI integration to be configured.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transcript (and draft notes when available) saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingRecording"
        "409":
          description: Recording is not an uploaded audio file
        "413":
          description: Recording exceeds the size or duration limit for transcription
        "422":
          description: Audio could not be decoded for transcription
        "503":
          description: AI transcription is not configured

