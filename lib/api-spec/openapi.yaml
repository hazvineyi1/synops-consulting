# ── Component Schemas ───────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ─────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalProjects, activeProjects, projectsByStage, totalClients, gateBlockedCount, overdueCount]
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        projectsByStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
        totalClients:
          type: integer
        gateBlockedCount:
          type: integer
        overdueCount:
          type: integer

    StageCount:
      type: object
      required: [stage, label, count]
      properties:
        stage:
          type: integer
        label:
          type: string
        count:
          type: integer

    ActivityFeedItem:
      type: object
      required: [id, projectId, projectTitle, action, entityType, entityTitle, timestamp]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectTitle:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityTitle:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Client ────────────────────────────────────────────────────
    Client:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        institution:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        projectCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        contactEmail:
          type: string
        institution:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: string
        contactEmail:
          type: string
        institution:
          type: string
        notes:
          type: string

    # ── Project ───────────────────────────────────────────────────
    Project:
      type: object
      required: [id, clientId, title, stage, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        title:
          type: string
        stage:
          type: integer
          description: "0=Kickoff/Intake, 1=Backward Design, 2=Prototype, 3=Production, 4=QA, 5=Handoff"
        status:
          type: string
          description: "active | paused | complete | gate_blocked"
        tier:
          type: ["string", "null"]
        modality:
          type: ["string", "null"]
        lms:
          type: ["string", "null"]
          description: "Learning management system (Canvas, Blackboard, Moodle, D2L Brightspace, Schoology, other)"
        description:
          type: ["string", "null"]
        targetDeliveryDate:
          type: ["string", "null"]
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [clientId, title]
      properties:
        clientId:
          type: integer
        title:
          type: string
          minLength: 1
        description:
          type: string
        tier:
          type: string
