kind = "video"
previewPath = "/curriculum-builder-demo/"
title = "Curriculum Builder Demo"
version = "1.0.0"
id = "artifacts/curriculum-builder-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/curriculum-builder-demo/" ]
localPort = 25437

[services.development]
run = "pnpm --filter @workspace/curriculum-builder-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/curriculum-builder-demo", "run", "build" ]
publicDir = "artifacts/curriculum-builder-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25437"
BASE_PATH = "/curriculum-builder-demo/"
